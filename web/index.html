<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>smolbench dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>smolbench</h1>
    <p>A tiny, honest benchmark for evaluating LLMs</p>
    <div id="controls">
      <input id="search" type="text" placeholder="Filter runs..." />
      <select id="provider-filter"><option value="">All providers</option></select>
      <select id="suite-filter"><option value="">All suites</option></select>
    </div>
  </header>

  <main>
    <section id="summary-cards"></section>
    <section id="tabs">
      <button class="tab active" data-tab="leaderboard">Leaderboard</button>
      <button class="tab" data-tab="scatter">Cost vs Quality</button>
      <button class="tab" data-tab="cdf">Latency CDF</button>
      <button class="tab" data-tab="diff">Diff View</button>
    </section>
    <div id="tab-content"></div>
  </main>

  <footer>
    <p>Built with <a href="https://github.com/ShageeshanT/smolbench">smolbench</a></p>
  </footer>

  <script src="web/runs-loader.js"></script>
  <script src="web/leaderboard.js"></script>
  <script src="web/scatter.js"></script>
  <script src="web/cdf.js"></script>
  <script src="web/diff.js"></script>
  <script src="web/filters.js"></script>
  <script src="web/share.js"></script>
</body>
</html>
